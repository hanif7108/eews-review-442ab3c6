<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Full Manuscript — IEEE Access | Adaptive PTW-EEWS</title>

<!-- Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<!-- MathJax for LaTeX equations -->
<script>
window.MathJax = {
  tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

<style>
:root{--blue:#1A5B8C;--blue2:#2E75B6;--green:#2e7d32;--orange:#e65100;--red:#c62828;--light:#f0f4f8;--border:#d0d7de;--card-shadow:0 2px 8px rgba(0,0,0,0.08);--toc-w:280px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;line-height:1.75;color:#24292f;background:#fff}
.banner{background:var(--blue);color:#fff;padding:10px 0;text-align:center;font-size:13px;position:sticky;top:0;z-index:50}
.lang-toggle{position:absolute;right:20px;top:8px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.lang-toggle:hover{background:rgba(255,255,255,0.3)}
nav.top{background:#fff;border-bottom:1px solid var(--border);padding:10px 24px;position:sticky;top:36px;z-index:40;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
nav.top a{padding:6px 14px;border-radius:20px;font-size:13px;text-decoration:none;color:#555;white-space:nowrap;transition:all 0.2s}
nav.top a:hover{background:var(--blue);color:#fff}
nav.top a.back{border:1px dashed var(--border)}
nav.top a.download{background:var(--blue);color:#fff}
nav.top a.download:hover{background:var(--blue2)}
.tocToggle{display:none;background:var(--orange);color:#fff;border:none;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600}
/* Layout: TOC + main content */
.layout{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:var(--toc-w) 1fr;gap:28px;padding:24px}
aside.toc{position:sticky;top:110px;height:calc(100vh - 130px);overflow-y:auto;padding-right:14px;border-right:1px solid var(--border);font-size:13px}
aside.toc h4{font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
aside.toc ul{list-style:none;padding-left:0}
aside.toc li{margin:4px 0}
aside.toc a{display:block;padding:4px 8px;color:#555;text-decoration:none;border-radius:4px;border-left:2px solid transparent;font-size:12.5px;line-height:1.4}
aside.toc a:hover{background:var(--light);border-left-color:var(--blue2)}
aside.toc a.active{background:var(--blue);color:#fff;border-left-color:var(--blue);font-weight:600}
aside.toc a.h3{padding-left:18px;font-size:11.5px;color:#777}
aside.toc a.h4{padding-left:32px;font-size:11px;color:#999}
main.content{min-width:0;max-width:880px}
/* Manuscript typography */
main.content h1{font-size:24px;color:var(--blue);line-height:1.35;margin:0 0 14px;font-weight:700}
main.content h2{font-size:19px;color:var(--blue);margin:28px 0 14px;padding-bottom:6px;border-bottom:2px solid var(--blue);scroll-margin-top:110px}
main.content h3{font-size:16px;color:#222;margin:22px 0 10px;scroll-margin-top:110px;font-weight:700}
main.content h4{font-size:14px;color:var(--blue);margin:16px 0 8px;scroll-margin-top:110px}
main.content p{font-size:14.5px;margin:10px 0;text-align:justify}
main.content strong,main.content b{color:#111}
main.content em{color:#444}
main.content ul,main.content ol{margin:10px 0 10px 26px;font-size:14px}
main.content li{margin:4px 0}
main.content hr{border:none;border-top:1px solid var(--border);margin:24px 0}
main.content blockquote{border-left:4px solid var(--orange);background:#fff8e1;padding:12px 18px;margin:14px 0;border-radius:0 6px 6px 0;font-size:13.5px;font-style:italic}
/* Tables */
main.content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12.5px;box-shadow:var(--card-shadow);border-radius:8px;overflow:hidden}
main.content th{background:var(--blue);color:#fff;padding:10px 12px;text-align:center;font-weight:600;font-size:12px}
main.content td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
main.content td:first-child{text-align:left}
main.content tr:nth-child(even){background:#f8f9fa}
/* Code inline */
main.content code{background:#f3f4f6;padding:1px 6px;border-radius:3px;font-family:'Consolas','Monaco',monospace;font-size:12.5px;color:#b00060}
main.content pre{background:#f6f8fa;padding:12px 16px;border-radius:6px;overflow-x:auto;margin:12px 0}
/* Math */
main.content mjx-container[display="true"]{margin:16px 0;font-size:105%!important}
/* Figures (auto-injected after certain paragraphs) */
.fig-embed{margin:22px 0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;box-shadow:var(--card-shadow)}
.fig-embed img{width:100%;display:block;cursor:zoom-in}
.fig-embed .cap{padding:10px 16px;font-size:12.5px;color:#444;background:#fafbfc;border-top:1px solid var(--border)}
.fig-embed .cap b{color:var(--blue)}
/* Mobile responsive */
@media(max-width:900px){
  .layout{grid-template-columns:1fr;padding:16px}
  aside.toc{position:fixed;top:80px;left:0;right:0;bottom:0;z-index:60;background:#fff;padding:20px;display:none;border-right:none;border-top:1px solid var(--border)}
  aside.toc.show{display:block}
  .tocToggle{display:inline-block}
  main.content h1{font-size:20px}
  main.content h2{font-size:17px}
  main.content h3{font-size:15px}
  main.content p{font-size:13.5px}
  main.content table{font-size:11px}
  nav.top{padding:8px 14px}
  nav.top a{padding:5px 10px;font-size:12px}
}
/* Lightbox for figures */
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:120;justify-content:center;align-items:center;cursor:zoom-out;padding:20px}
.lightbox.show{display:flex}
.lightbox img{max-width:95%;max-height:95%;border-radius:4px}
/* Loading state */
#loading{text-align:center;padding:60px 20px;color:#888;font-size:14px}
#loading .spin{display:inline-block;width:20px;height:20px;border:3px solid #ddd;border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* Info banner for Indonesian mode */
.id-notice{background:#fff3e0;border-left:4px solid var(--orange);padding:12px 16px;margin-bottom:16px;border-radius:0 6px 6px 0;font-size:13px;display:none}
.id-notice.show{display:block}
</style>
</head>
<body>

<!-- Banner -->
<div class="banner">
  <span data-en="CONFIDENTIAL — Peer review access only | IEEE Access submission"
        data-id="RAHASIA — Akses review saja | Submisi IEEE Access">CONFIDENTIAL — Peer review access only | IEEE Access submission</span>
  <button class="lang-toggle" onclick="toggleLang()">🌐 <span id="langLabel">ID</span></button>
</div>

<!-- Top nav -->
<nav class="top">
  <a href="index.html" class="back" data-en="← Back to Review" data-id="← Kembali ke Review">← Back to Review</a>
  <button class="tocToggle" onclick="document.querySelector('aside.toc').classList.toggle('show')" data-en="📑 TOC" data-id="📑 Daftar Isi">📑 TOC</button>
  <span style="flex:1"></span>
  <a href="data/manuscript_IEEE_Access.md" download class="download" data-en="⬇ .md" data-id="⬇ .md">⬇ .md</a>
  <a href="data/Manuscript_Audit_Report.docx" download class="download" data-en="⬇ Audit .docx" data-id="⬇ Audit .docx">⬇ Audit .docx</a>
</nav>

<div class="layout">

  <!-- Sticky TOC sidebar -->
  <aside class="toc">
    <h4 data-en="Table of Contents" data-id="Daftar Isi">Table of Contents</h4>
    <ul id="tocList">
      <li data-en="Loading..." data-id="Memuat..." style="color:#aaa;font-style:italic">Loading...</li>
    </ul>
  </aside>

  <!-- Main manuscript content -->
  <main class="content">

    <div class="id-notice" id="idNotice">
      <b data-en="Indonesian Translation Notice:" data-id="Catatan Terjemahan Bahasa Indonesia:">Catatan Terjemahan Bahasa Indonesia:</b>
      <span data-en="Full Indonesian translation: Abstract through Conclusion (Chapters I–VII), Acknowledgments, and Revision Notes. Reference list retained in English (paper titles are not translated per academic convention). All numbers, tables, figures, and equations are identical across both language modes. The authoritative submission version remains manuscript_IEEE_Access.md (English)."
            data-id="Terjemahan Indonesia lengkap: Abstrak hingga Kesimpulan (Bab I–VII), Ucapan Terima Kasih, dan Catatan Revisi. Daftar pustaka dipertahankan dalam bahasa Inggris (judul paper tidak diterjemahkan sesuai konvensi akademik). Semua angka, tabel, gambar, dan persamaan identik di kedua mode bahasa. Versi otoritatif untuk submisi tetap manuscript_IEEE_Access.md (English)."></span>
    </div>

    <div id="loading"><span class="spin"></span>
      <span data-en="Loading manuscript (~900 lines)..." data-id="Memuat manuskrip (~900 baris)...">Loading manuscript (~900 lines)...</span>
    </div>

    <div id="manuscriptContent" style="display:none"></div>

  </main>

</div>

<!-- Lightbox (figure zoom) -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ============ Language toggle ============
let currentLang = 'en';
const MANUSCRIPT_SOURCES = {
  en: 'data/manuscript_IEEE_Access.md',
  id: 'data/manuscript_IEEE_Access_ID.md'
};
function toggleLang() {
  currentLang = currentLang === 'en' ? 'id' : 'en';
  document.getElementById('langLabel').textContent = currentLang === 'en' ? 'ID' : 'EN';
  document.querySelectorAll('[data-en]').forEach(el => {
    const next = el.getAttribute('data-' + currentLang);
    if (next) el.innerHTML = next;
  });
  // Toggle Indonesian-mode notice
  document.getElementById('idNotice').classList.toggle('show', currentLang === 'id');
  // Reload manuscript body in selected language
  loadManuscript();
}

// ============ Figure metadata: which figures to embed, and where ============
// Map: when content matches a specific heading or nearby paragraph, inject figure after it.
const FIGURES = [
  {
    id: 'fig-seismicity',
    src: 'figures/seismicity_map.png',
    caption_en: '<b>Figure A — Java-Sunda Seismicity &amp; Station Network.</b> 25,058 traces from 338 events (coloured circles by M<sub>w</sub>) recorded at 125 IA-BMKG accelerograph stations (orange triangles).',
    caption_id: '<b>Gambar A — Seismisitas Java-Sunda &amp; Jaringan Stasiun.</b> 25.058 trace dari 338 event (lingkaran berwarna berdasarkan M<sub>w</sub>) direkam di 125 stasiun akselerograf IA-BMKG (segitiga oranye).',
    afterHeading: 'III. Dataset Curation and Feature Engineering'
  },
  {
    id: 'fig-comparison',
    src: 'figures/comparison_fixed_vs_ida_vs_fullwave.png',
    caption_en: '<b>Figure B — Spectral Accuracy Comparison.</b> Fixed PTW (3s / 10s, red dashed) vs IDA-PTW adaptive (blue solid) vs Full-Wave ML (green) vs Newmark-Beta theoretical ceiling (purple). Red band = EEWS-critical zone T = 0.1–3 s.',
    caption_id: '<b>Gambar B — Perbandingan Akurasi Spektral.</b> Fixed PTW (3s / 10s, merah putus-putus) vs IDA-PTW adaptif (biru solid) vs Full-Wave ML (hijau) vs plafon teoritis Newmark-Beta (ungu). Pita merah = zona kritis EEWS T = 0,1–3 s.',
    afterHeading: 'A. Experiment 1: Fixed-Window Benchmark vs. IDA-PTW Adaptive'
  },
  {
    id: 'fig-curve',
    src: 'figures/per_period_r2_full.png',
    caption_en: '<b>Figure C — Per-Period R² Curve (Stage 2 XGBoost).</b> R² peaks at T = 0.3 s (0.880), fundamental period of 3–5-storey Indonesian concrete structures. Gently decays at long T due to site-dominated φ variance.',
    caption_id: '<b>Gambar C — Kurva R² Per-Periode (Stage 2 XGBoost).</b> R² memuncak di T = 0,3 s (0,880), periode fundamental struktur beton Indonesia 3–5 lantai. Turun lembut di T panjang karena varians φ dominan-site.',
    afterHeading: 'E. Experiment 5: Sigma Decomposition and Extended Statistical Characterization'
  },
  {
    id: 'fig-gating',
    src: 'figures/xgboost_gated_stage2_comparison.png',
    caption_en: '<b>Figure D — Stage 2 Intensity Gating.</b> Unfiltered baseline (grey dashed, 28.2k traces) vs Gated top-25k (red solid) vs Full-Wave ceiling (green). Pink band = accuracy gain from Stage 1 → Stage 2 cascade.',
    caption_id: '<b>Gambar D — Gating Intensitas Stage 2.</b> Baseline tak-terfilter (abu-abu putus-putus, 28,2k trace) vs Gated top-25k (merah solid) vs plafon Full-Wave (hijau). Pita merah muda = peningkatan akurasi dari cascade Stage 1 → Stage 2.',
    afterHeading: 'E. Stage 2: Adaptive PTW Spectral Regressor Ensemble'
  },
  {
    id: 'fig-intensity',
    src: 'figures/intensity_vs_accuracy_correlation.png',
    caption_en: '<b>Figure E — Accuracy by PGA Intensity Bin.</b> Left: R² score per bin (Weak/Moderate/Strong/Severe) at 5 anchor periods — monotonic improvement with PGA, R² ≈ 0.85 at Severe. Right: Log-RMSE shrinks ~40% from Weak to Severe.',
    caption_id: '<b>Gambar E — Akurasi berdasarkan Bin Intensitas PGA.</b> Kiri: skor R² per bin (Weak/Moderate/Strong/Severe) di 5 periode anchor — peningkatan monoton dengan PGA, R² ≈ 0,85 di Severe. Kanan: Log-RMSE menyusut ~40% dari Weak ke Severe.',
    afterHeading: 'C. Dataset Statistics and Class Distribution'
  },
  {
    id: 'fig-valid-03',
    src: 'figures/validation_dashboard_T0.300.png',
    caption_en: '<b>Figure F — Validation Dashboard at T = 0.3 s.</b> (A) XGBoost feature importance (tp and CVAD dominate). (B) True vs predicted log Sa(0.3s), R² = 0.722. (C) Residual histogram (μ = +0.006, σ = 0.486) — Gaussian, zero-bias.',
    caption_id: '<b>Gambar F — Dashboard Validasi pada T = 0,3 s.</b> (A) Feature importance XGBoost (tp dan CVAD dominan). (B) log Sa(0,3s) sebenarnya vs prediksi, R² = 0,722. (C) Histogram residual (μ = +0,006, σ = 0,486) — Gaussian, zero-bias.',
    afterParagraph: 'Key findings:'
  }
];

// ============ Manuscript loader ============
async function loadManuscript() {
  // Show loading state
  const loadEl = document.getElementById('loading');
  const contEl = document.getElementById('manuscriptContent');
  loadEl.style.display = 'block';
  loadEl.innerHTML = '<span class="spin"></span> <span>' +
    (currentLang === 'id' ? 'Memuat manuskrip...' : 'Loading manuscript...') + '</span>';
  contEl.style.display = 'none';
  contEl.innerHTML = '';

  try {
    const source = MANUSCRIPT_SOURCES[currentLang] || MANUSCRIPT_SOURCES.en;
    const response = await fetch(source);
    if (!response.ok) throw new Error('Failed to fetch manuscript: ' + source);
    let md = await response.text();

    // Configure marked
    marked.setOptions({
      gfm: true,
      breaks: false,
      headerIds: true,
      mangle: false,
      smartLists: true
    });

    // Render markdown → HTML
    let html = marked.parse(md);

    // Add IDs to headings for anchor links
    html = addHeadingIds(html);

    // Inject figures at appropriate positions
    html = injectFigures(html);

    // Inject into DOM
    const target = document.getElementById('manuscriptContent');
    target.innerHTML = html;
    target.style.display = 'block';
    document.getElementById('loading').style.display = 'none';

    // Build TOC from rendered headings
    buildTOC();

    // Setup figure lightbox
    setupLightbox();

    // Setup scroll-spy for TOC
    setupScrollSpy();

    // Trigger MathJax re-render
    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise([target]);
    }

  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<b style="color:var(--red)">Error:</b> Could not load manuscript. ' +
      'Open the file directly: <a href="data/manuscript_IEEE_Access.md" download>manuscript_IEEE_Access.md</a><br>' +
      '<small>Detail: ' + err.message + '</small>';
  }
}

function addHeadingIds(html) {
  // marked adds IDs automatically; if not, we can post-process
  return html;
}

function slugify(text) {
  return text.toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').substring(0, 60);
}

function injectFigures(html) {
  // Parse HTML string to DOM
  const tmp = document.createElement('div');
  tmp.innerHTML = html;

  FIGURES.forEach(fig => {
    let anchor = null;

    if (fig.afterHeading) {
      // Find a heading whose text matches (loose contains match)
      const headings = tmp.querySelectorAll('h1, h2, h3, h4');
      for (const h of headings) {
        if (h.textContent.includes(fig.afterHeading.substring(0, 30))) {
          anchor = h; break;
        }
      }
    } else if (fig.afterParagraph) {
      // Find a paragraph whose text matches
      const paras = tmp.querySelectorAll('p, strong');
      for (const p of paras) {
        if (p.textContent.includes(fig.afterParagraph.substring(0, 20))) {
          anchor = p; break;
        }
      }
    }

    if (anchor) {
      const figEl = document.createElement('div');
      figEl.className = 'fig-embed';
      figEl.innerHTML = `
        <img src="${fig.src}" alt="${fig.id}" loading="lazy">
        <div class="cap">
          <span data-en="${fig.caption_en.replace(/"/g,'&quot;')}"
                data-id="${fig.caption_id.replace(/"/g,'&quot;')}">${fig.caption_en}</span>
        </div>
      `;
      // Insert AFTER the anchor's next paragraph (to let some context come first)
      let insertAfter = anchor;
      let next = anchor.nextElementSibling;
      if (next && (next.tagName === 'P' || next.tagName === 'UL')) insertAfter = next;
      insertAfter.parentNode.insertBefore(figEl, insertAfter.nextSibling);
    }
  });

  return tmp.innerHTML;
}

function buildTOC() {
  const toc = document.getElementById('tocList');
  toc.innerHTML = '';
  const headings = document.querySelectorAll('main.content h2, main.content h3, main.content h4');
  let idCounter = 0;
  headings.forEach(h => {
    // Skip h4 for TOC cleanliness (too granular)
    if (h.tagName === 'H4') return;
    // Ensure heading has an id
    if (!h.id) {
      h.id = 'sec-' + slugify(h.textContent) + '-' + (++idCounter);
    }
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.length > 70 ? h.textContent.substring(0, 68) + '…' : h.textContent;
    a.className = h.tagName.toLowerCase();
    a.dataset.targetId = h.id;
    li.appendChild(a);
    toc.appendChild(li);

    // Close mobile TOC after click
    a.addEventListener('click', () => {
      document.querySelector('aside.toc').classList.remove('show');
    });
  });
}

function setupLightbox() {
  document.querySelectorAll('.fig-embed img').forEach(img => {
    img.addEventListener('click', () => {
      document.getElementById('lightboxImg').src = img.src;
      document.getElementById('lightbox').classList.add('show');
    });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('show');
  });
}

function setupScrollSpy() {
  const tocLinks = document.querySelectorAll('#tocList a');
  const idMap = {};
  tocLinks.forEach(a => idMap[a.dataset.targetId] = a);

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const link = idMap[entry.target.id];
      if (link) {
        if (entry.isIntersecting) {
          tocLinks.forEach(a => a.classList.remove('active'));
          link.classList.add('active');
        }
      }
    });
  }, { rootMargin: '-100px 0px -60% 0px' });

  document.querySelectorAll('main.content h2, main.content h3').forEach(h => {
    if (h.id) observer.observe(h);
  });
}

// Start loading immediately
loadManuscript();
</script>

</body>
